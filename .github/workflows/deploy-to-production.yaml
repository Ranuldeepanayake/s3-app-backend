#Deploy a production image given as an input and update the GitOps repository. A pull request must also be created to merge the release or hotfix branch which 
#is the source of the image into the main branch.

name: Deploy to production

#Trigger the workflow on-push and manually.
on:
  workflow_dispatch:
    inputs:
      #Source image tag.
      INPUT_IMAGE_TAG:
        description: "Image tag (ex- 1.5.0, 1.6.2)"
        required: true

#Global environment variables.
env:
  PARENT_BRANCH: main
  COMMIT_USERNAME: github-actions
  COMMIT_EMAIL: github-actions@github.com
  DEPLOYMENT_REPOSITORY: Ranuldeepanayake/helm
  DEPLOYMENT_REPOSITORY_PATH: deployment-repo
  PROD_ENVIRONMENT_SOURCE_FILE: env/env-prod
  PROD_ENVIRONMENT_DESTINATION_FILE: environments/s3-app/prod/backend-env.yaml
  PROD_ENVIRONMENT_VALUES_FILE: environments/s3-app/prod/values.yaml
  DEPLOYMENT_MANIFEST_SERVICE_NAME: backend

#Permissions.
permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-to-production:

    #Runner label.
    runs-on: ubuntu-latest

    steps:
      #Checkout the branch which is being built.
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        with:
        #token: ${{ secrets.DEPLOYMENT_REPOSITORY_TOKEN }}
        ssh-key: ${{ secrets.DEPLOYMENT_REPOSITORY_SSH_PRIVATE_KEY }}
        #Cleans the workspace before checking out code.
        clean: true
        fetch-depth: 0   #Required to push back

      #Ensure jq is available. 
    - name: Install jq 
      run: sudo apt update && sudo apt install -y jq

      #Check if the image tag is in the correct format.
    - name: Validate image tag
      run: |
        echo "Input image tag: ${INPUT_IMAGE_TAG}"
        
        #Allowed patterns.
        PATTERN_1="([0-9]+\.[0-9]+\.[0]){1,1}"
        PATTERN_2="([0-9]+\.[0-9]+\.[0-9]+){1,1}"

        if [[ "${INPUT_IMAGE_TAG}" =~ $PATTERN_1 ]]; then
          echo "RELEASE image tag selected: ${INPUT_IMAGE_TAG}"
        eliif [[ "${INPUT_IMAGE_TAG}" =~ $PATTERN_2 ]]; then
          echo "HOTFIX image tag selected: ${INPUT_IMAGE_TAG}"
        else
          echo "❌ invalid input image tag: ${INPUT_IMAGE_TAG}"
          exit 1          
        fi

        #Append the version number variable to the array of runtime variables.
        echo "IMAGE_TAG=${INPUT_IMAGE_TAG}" >> $GITHUB_ENV
        echo "Image tag: ${IMAGE_TAG}"

    #Deployment. The .env file must be copied to the deployment repository regardless whether the file is deployed or not. But why though??
    #It is better not to copy since a change would trigger a deployment even if the image tag is not changed. So, only copy the .env file if the deploy option is selected.

    #Checkout the gitops repository.
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: ${{ env.DEPLOYMENT_REPOSITORY }}
        #token: ${{ secrets.DEPLOYMENT_REPOSITORY_TOKEN }}
        ssh-key: ${{ secrets.DEPLOYMENT_REPOSITORY_SSH_PRIVATE_KEY }}
        path: ${{ env.DEPLOYMENT_REPOSITORY_PATH }}
        clean: true      #Cleans the workspace before checking out code.
        fetch-depth: 0   #Required to push back

      #Checkout the release branch again to get the .env file.
    - name: Checkout release branch
      run: |
        git checkout ${BRANCH_NAME}
        echo "Selected branch: $(git branch)"

      #Copy environment variables to the deployment repository.
    - name: Copy the .env file
      run: |
        cp ${PROD_ENVIRONMENT_SOURCE_FILE} ${DEPLOYMENT_REPOSITORY_PATH}/${PROD_ENVIRONMENT_DESTINATION_FILE}
        cd ${DEPLOYMENT_REPOSITORY_PATH}

        #Verify the change.
        if [[ -f "${PROD_ENVIRONMENT_DESTINATION_FILE}" ]]; then
          echo "✅ .env file exists"
        else
          echo "❌ .env file does not exist!"
          exit 1
        fi

    #Change the image tag. Only if the deploy option is selected.
    - name: Change the image tag
      uses: mikefarah/yq@v4.44.1
      with:
        cmd: |
          cd ${DEPLOYMENT_REPOSITORY_PATH}
          yq -i '(.containers[] | select(.name == env(DEPLOYMENT_MANIFEST_SERVICE_NAME)) | .tag) = env(IMAGE_TAG)' "${PROD_ENVIRONMENT_VALUES_FILE}"

          #Verify the change.
          TAG_READ_BACK=$(yq '.containers[] | select(.name == env(DEPLOYMENT_MANIFEST_SERVICE_NAME)) | .tag' "${PROD_ENVIRONMENT_VALUES_FILE}")
          echo "Tag read back: $TAG_READ_BACK"

    #Commit and push the change to the deployment repository.
    - name: Commit and push
      run: |
        cd ${DEPLOYMENT_REPOSITORY_PATH}

        git config user.name ${COMMIT_USERNAME} 
        git config user.email ${COMMIT_EMAIL}

        git add ${PROD_ENVIRONMENT_VALUES_FILE};
        git add ${PROD_ENVIRONMENT_DESTINATION_FILE};
        git commit -m "Pipeline (helm): replaced the image tag with ${IMAGE_TAG} and the .env file" || echo "No changes to commit"

        git push