#Build the develop, feature or bugfix branches, upload the artifact to a repository and update the GitOps repository.

name: Build feature branch

#Trigger the workflow on push, on pull requests and manually.
on:
  # push:
  #   branches: 
    # - develop
    # - "feature/**"
    # - "bugfix/**"
  pull_request:
    types: [opened]
    branches:
    - develop
  workflow_dispatch:
    inputs:
      #Input to select the action.
      INPUT_ACTION:
        description: 'Select action'
        required: true
        default: build-and-deploy
        type: choice
        options:
          - build
          - build-and-deploy

#Global environment variables.
env:
  INPUT_ACTION: ${{ github.event.inputs.INPUT_ACTION || 'build-and-deploy' }} #Default needed since the workflow will not use the input default when run on-push.
  VERSION_FILE: package.json
  AWS_REGION: ap-southeast-1
  AWS_USERNAME: AWS
  ECR_REPOSITORY_URL: 104322896078.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY_GROUP: s3-app
  ECR_REPOSITORY_NAME: backend
  COMMIT_USERNAME: github-actions
  COMMIT_EMAIL: github-actions@github.com
  DEPLOYMENT_REPOSITORY: Ranuldeepanayake/helm
  DEPLOYMENT_REPOSITORY_BRANCH: develop
  DEPLOYMENT_REPOSITORY_PATH: deployment-repo
  DEV_ENVIRONMENT_SOURCE_FILE: env/env-dev
  DEV_ENVIRONMENT_DESTINATION_FILE: environments/s3-app/dev/backend-env.yaml
  DEV_ENVIRONMENT_VALUES_FILE: environments/s3-app/dev/values.yaml
  DEPLOYMENT_MANIFEST_SERVICE_NAME: backend

#Permissions.
permissions:
  contents: write

jobs:
  build-feature-branch:

    runs-on: ubuntu-latest  #Runner label.
    timeout-minutes: 30     #Timeout against runaway jobs.

    #Checkout the branch which is being built.
    steps:
    - name: Repository checkout
      uses: actions/checkout@v4
      with:
        clean: true      #Cleans the workspace before checking out code.
        fetch-depth: 0   #Required to push back

      #Ensure jq is available. 
    - name: Install jq 
      run: sudo apt update && sudo apt install -y jq

      #Get the branch name.
    - name: Get branch name
      run: |
        #Get the branch name. The below statement handles the change in variable used depending on push/pull.
        BRANCH_NAME="${GITHUB_REF_NAME:-${GITHUB_HEAD_REF}}"
        echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
        echo "Branch name: ${BRANCH_NAME}"

      #Branch name validation. Skip if building a pull request since the branch name is not available in that case.
    - name: Validate branch name
      if: github.event_name != 'pull_request'
      run: |
        #Allowed patterns.
        PATTERN="^(develop|feature/.+|bugfix/.+)$"

        if [[ "${BRANCH_NAME}" =~ $PATTERN ]]; then
          echo "✅ valid branch: ${BRANCH_NAME}"
        else
          echo "❌ invalid branch: ${BRANCH_NAME}"
          exit 1
        fi

      #Check if the version number is in the correct format.
    - name: Validate version number
      run: |
        echo "Version file: ${VERSION_FILE}"

        #Read the version file.
        VERSION_NUMBER=$(jq -r '.version' ${VERSION_FILE} | tr -d '\n')

        #If node is installed in the runtime environment.
        #VERSION_NUMBER=$(node -p "require('./package.json').version") 
        
        #Append the version number variable to the array of runtime variables.
        echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_ENV
        echo "Version number: ${VERSION_NUMBER}"
        
        #Allowed patterns.
        PATTERN="([0-9]+\.[0-9]+\.[0]){1,1}"

        if [[ ! ${VERSION_NUMBER} =~ $PATTERN ]]; then
          echo "❌ Version number ${VERSION_NUMBER} is inconsistent with the format. Exiting!"
          echo "Allowed formats: x.x.0"
          exit 1
        else
          echo "✅ Version number ${VERSION_NUMBER} is consistent with the format"
        fi

      #Prepare the image tag with the necessary common appends.
    - name: Prepare image tag common appends
      run: | 
        #Append the time stamp variable to the array of runtime variables.
        BUILD_TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
        echo "BUILD_TIMESTAMP=$BUILD_TIMESTAMP" >> $GITHUB_ENV
        echo "Build timestamp: ${BUILD_TIMESTAMP}"

        #Append the commit digest.
        DIGEST_SHA=COMMITSHA_$(echo "${GITHUB_SHA}" | cut -c1-8)
        echo "DIGEST_SHA=$DIGEST_SHA" >> $GITHUB_ENV
        echo "Digest (SHA): ${DIGEST_SHA}"

      #Prepare the image tag with the branch name except for pull requests.
    - name: Append image tag with branch name
      if: github.event_name != 'pull_request'
      run: | 
        echo "Head is a branch, not a pull request"

        #Conditional image tagging based on the branch name.
        if [[ "${BRANCH_NAME}" == "develop" ]]; then
          IMAGE_TAG=${VERSION_NUMBER}-DEVELOP-SNAPSHOT-${BUILD_TIMESTAMP}-${DIGEST_SHA}
        elif [[ "${BRANCH_NAME}" == feature/* ]]; then
          IMAGE_TAG=${VERSION_NUMBER}-FEATURE-SNAPSHOT-${BUILD_TIMESTAMP}-${DIGEST_SHA}
        elif [[ "${BRANCH_NAME}" == bugfix/* ]]; then
          IMAGE_TAG=${VERSION_NUMBER}-BUGFIX-SNAPSHOT-${BUILD_TIMESTAMP}-${DIGEST_SHA}
        else
          echo "❌ invalid branch: ${BRANCH_NAME}"
          exit 1
        fi

        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        echo "Image tag: ${IMAGE_TAG}"

      #Prepare the image tag with the necessary appends for pull requests only.
    - name: Append image tag with pull request number
      if: github.event_name == 'pull_request'
      run: | 
        echo "Head is a pull request, not a branch"

        PULL_REQUEST_NUMBER=$(echo ${BRANCH_NAME} | awk -F '/' '{print $1}' | tr -d '\n')
        echo "PULL_REQUEST_NUMBER=$PULL_REQUEST_NUMBER" >> $GITHUB_ENV
        echo "Pull request number: ${PULL_REQUEST_NUMBER}"

        IMAGE_TAG=${VERSION_NUMBER}-PULLREQUEST_${PULL_REQUEST_NUMBER}-SNAPSHOT-${BUILD_TIMESTAMP}-${DIGEST_SHA}

        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        echo "Image tag: ${IMAGE_TAG}"

      #Configure the artifact repository credentials.
    - name: Configure artifact repository credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

      #Log in to the artifact repository (private).
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

      #Log in to the artifact repository (public).
    # - name: Login to the artifact repository
    #   run: |
    #     aws ecr-public get-login-password --region ${AWS_REGION} | docker login --username ${AWS_USERNAME} --password-stdin ${ECR_REPOSITORY_URL}

      #Build the image.
    - name: Build image
      run: |
        echo "Image name: ${ECR_REPOSITORY_URL}/${ECR_REPOSITORY_GROUP}/${ECR_REPOSITORY_NAME}:${IMAGE_TAG}"
        docker build -t ${ECR_REPOSITORY_URL}/${ECR_REPOSITORY_GROUP}/${ECR_REPOSITORY_NAME}:${IMAGE_TAG} .

      #Push the built image to an artifact repository.
    - name: Push image to artifact repository
      run: |
        docker push ${ECR_REPOSITORY_URL}/${ECR_REPOSITORY_GROUP}/${ECR_REPOSITORY_NAME}:${IMAGE_TAG}

    ###############################################
    #Deployment. 
    ###############################################
    #It is better not to copy the .env file if the deployment option has not been selected, since a change in the .env would trigger a deployment even 
    #which would contradict the intention of the user who selected the build option only. Therefore, only copy the .env file if the buil-and-deploy option is selected.

    #Checkout the gitops repository.
    - name: Checkout the deployment repository
      if: ${{ env.INPUT_ACTION == 'build-and-deploy' }}
      uses: actions/checkout@v4
      with:
        repository: ${{ env.DEPLOYMENT_REPOSITORY }}
        ref: ${{ env.DEPLOYMENT_REPOSITORY_BRANCH }}
        ssh-key: ${{ secrets.DEPLOYMENT_REPOSITORY_SSH_PRIVATE_KEY }}
        path: ${{ env.DEPLOYMENT_REPOSITORY_PATH }}
        clean: true      #Cleans the workspace before checking out code.
        fetch-depth: 0   #Required to push back

      #Copy the .env file to the deployment repository.
    - name: Copy the .env file to the deployment repository
      if: ${{ env.INPUT_ACTION == 'build-and-deploy' }}
      run: |
        cp ${DEV_ENVIRONMENT_SOURCE_FILE} ${DEPLOYMENT_REPOSITORY_PATH}/${DEV_ENVIRONMENT_DESTINATION_FILE}
        cd ${DEPLOYMENT_REPOSITORY_PATH}

        #Verify the change.
        if [[ -f "${DEV_ENVIRONMENT_DESTINATION_FILE}" ]]; then
          echo "✅ .env file exists in the destination"
        else
          echo "❌ .env file does not exist in the destination!"
          exit 1
        fi

      #Change the image tag in the deployment repository.
    - name: Update the image tag in the deployment repository
      if: ${{ env.INPUT_ACTION == 'build-and-deploy' }}
      uses: mikefarah/yq@v4.44.1
      with:
        cmd: |
          cd ${DEPLOYMENT_REPOSITORY_PATH}
          yq -i '(.containers[] | select(.name == env(DEPLOYMENT_MANIFEST_SERVICE_NAME)) | .tag) = env(IMAGE_TAG)' "${DEV_ENVIRONMENT_VALUES_FILE}"

          #Verify the change.
          TAG_READ_BACK=$(yq '.containers[] | select(.name == env(DEPLOYMENT_MANIFEST_SERVICE_NAME)) | .tag' "${DEV_ENVIRONMENT_VALUES_FILE}")
          echo "Tag read back: $TAG_READ_BACK"

          if [[ "$TAG_READ_BACK" == "${IMAGE_TAG}" ]]; then
            echo "✅ Image tag updated successfully"
          else
            echo "❌ Image tag update failed!"
            exit 1
          fi

      #Commit and push changes to the deployment repository.
    - name: Commit and push to the deployment repository
      if: ${{ env.INPUT_ACTION == 'build-and-deploy' }}
      run: |
        cd ${DEPLOYMENT_REPOSITORY_PATH}

        git config user.name ${COMMIT_USERNAME} 
        git config user.email ${COMMIT_EMAIL}

        git add ${DEV_ENVIRONMENT_VALUES_FILE};
        git add ${DEV_ENVIRONMENT_DESTINATION_FILE};
        git commit -m "Pipeline (helm): replaced the image tag with ${IMAGE_TAG} and the .env file" || echo "No changes to commit"

        git push
